<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Social Content — Đăng nhập</title>
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/config.js" defer></script>
</head>
<body>
<div id="login-page">
  <div class="parallax-bg" id="parallax-bg"></div>

  <div class="login-card" id="card-login">
    <div class="login-logo">
      <div class="login-logo-icon"><i class="ti ti-chart-dots"></i></div>
      <div class="login-logo-name">Social Content</div>
    </div>
    <div class="error-msg" id="login-error"></div>
    <div class="success-msg" id="login-success"></div>
    <button class="google-btn" onclick="loginGoogle()">
      <svg width="18" height="18" viewBox="0 0 18 18"><path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.875 2.684-6.615z"/><path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.258c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332C2.438 15.983 5.482 18 9 18z"/><path fill="#FBBC05" d="M3.964 10.707c-.18-.54-.282-1.117-.282-1.707s.102-1.167.282-1.707V4.961H.957C.347 6.175 0 7.55 0 9s.348 2.825.957 4.039l3.007-2.332z"/><path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0 5.482 0 2.438 2.017.957 4.961L3.964 7.293C4.672 5.166 6.656 3.58 9 3.58z"/></svg>
      Tiếp tục với Google
    </button>
    <div class="or-divider">hoặc</div>
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="login-email" placeholder="email@example.com">
    </div>
    <div class="form-group">
      <label>Mật khẩu</label>
      <input type="password" id="login-password" placeholder="••••••••" onkeydown="if(event.key==='Enter')loginEmail()">
    </div>
    <div style="text-align:right;margin-bottom:1rem">
      <button class="link-btn" onclick="showCard('forgot')">Quên mật khẩu?</button>
    </div>
    <button class="btn btn-primary btn-full" onclick="loginEmail()">Đăng nhập</button>
    <p style="text-align:center;margin-top:1rem;font-size:13px;color:var(--text-muted)">
      Chưa có tài khoản? <button class="link-btn" onclick="showCard('register')">Đăng ký ngay</button>
    </p>
  </div>

  <div class="login-card hidden" id="card-register">
    <div class="login-logo">
      <div class="login-logo-icon"><i class="ti ti-chart-dots"></i></div>
      <div class="login-logo-name">Tạo tài khoản</div>
    </div>
    <div class="error-msg" id="register-error"></div>
    <div class="success-msg" id="register-success"></div>
    <div class="form-group">
      <label>Họ và tên</label>
      <input type="text" id="register-name" placeholder="Nguyễn Văn A">
    </div>
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="register-email" placeholder="email@example.com">
    </div>
    <div class="form-group">
      <label>Mật khẩu</label>
      <input type="password" id="register-password" placeholder="Tối thiểu 6 ký tự">
    </div>
    <button class="btn btn-primary btn-full" onclick="registerEmail()">Đăng ký</button>
    <p style="text-align:center;margin-top:1rem;font-size:13px;color:var(--text-muted)">
      Đã có tài khoản? <button class="link-btn" onclick="showCard('login')">Đăng nhập</button>
    </p>
  </div>

  <div class="login-card hidden" id="card-forgot">
    <div class="login-logo">
      <div class="login-logo-icon"><i class="ti ti-lock-open"></i></div>
      <div class="login-logo-name">Quên mật khẩu</div>
    </div>
    <div class="error-msg" id="forgot-error"></div>
    <div class="success-msg" id="forgot-success"></div>
    <p style="font-size:13px;color:var(--text-muted);margin-bottom:1rem">Nhập email của bạn, chúng tôi sẽ gửi link đặt lại mật khẩu.</p>
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="forgot-email" placeholder="email@example.com">
    </div>
    <button class="btn btn-primary btn-full" onclick="forgotPassword()">Gửi link đặt lại</button>
    <p style="text-align:center;margin-top:1rem;font-size:13px;color:var(--text-muted)">
      <button class="link-btn" onclick="showCard('login')"><i class="ti ti-arrow-left"></i> Quay lại đăng nhập</button>
    </p>
  </div>
</div>

<script>
// Parallax background
const bg = document.getElementById('parallax-bg')
const circles = [
  {size:300,x:10,y:10,color:'#534AB7'},
  {size:200,x:70,y:60,color:'#1D9E75'},
  {size:150,x:85,y:15,color:'#534AB7'},
  {size:250,x:20,y:70,color:'#1D9E75'},
  {size:100,x:50,y:40,color:'#534AB7'},
]
circles.forEach(c => {
  const el = document.createElement('div')
  el.className = 'parallax-circle'
  el.style.cssText = `width:${c.size}px;height:${c.size}px;left:${c.x}%;top:${c.y}%;background:${c.color};transform:translate(-50%,-50%)`
  bg.appendChild(el)
})
document.addEventListener('mousemove', e => {
  const x = e.clientX / window.innerWidth
  const y = e.clientY / window.innerHeight
  bg.querySelectorAll('.parallax-circle').forEach((el, i) => {
    const speed = (i + 1) * 8
    el.style.transform = `translate(calc(-50% + ${(x-.5)*speed}px), calc(-50% + ${(y-.5)*speed}px))`
  })
})

function showCard(name) {
  document.querySelectorAll('.login-card').forEach(c => c.classList.add('hidden'))
  document.getElementById('card-'+name).classList.remove('hidden')
}

function showError(id, msg) {
  const el = document.getElementById(id)
  el.textContent = msg
  el.style.display = 'block'
  setTimeout(() => el.style.display = 'none', 5000)
}
function showSuccess(id, msg) {
  const el = document.getElementById(id)
  el.textContent = msg
  el.style.display = 'block'
}

async function loginGoogle() {
  const { error } = await supabase.auth.signInWithOAuth({
    provider: 'google',
    options: { redirectTo: window.location.origin + '/index.html' }
  })
  if (error) showError('login-error', error.message)
}

async function loginEmail() {
  const email = document.getElementById('login-email').value.trim()
  const password = document.getElementById('login-password').value
  if (!email || !password) return showError('login-error', 'Vui lòng nhập đầy đủ thông tin')
  const { error } = await supabase.auth.signInWithPassword({ email, password })
  if (error) showError('login-error', 'Email hoặc mật khẩu không đúng')
  else window.location.href = 'index.html'
}

async function registerEmail() {
  const name = document.getElementById('register-name').value.trim()
  const email = document.getElementById('register-email').value.trim()
  const password = document.getElementById('register-password').value
  if (!name || !email || !password) return showError('register-error', 'Vui lòng nhập đầy đủ thông tin')
  if (password.length < 6) return showError('register-error', 'Mật khẩu tối thiểu 6 ký tự')
  const { error } = await supabase.auth.signUp({
    email, password,
    options: { data: { full_name: name } }
  })
  if (error) showError('register-error', error.message)
  else showSuccess('register-success', 'Đăng ký thành công! Kiểm tra email để xác nhận tài khoản.')
}

async function forgotPassword() {
  const email = document.getElementById('forgot-email').value.trim()
  if (!email) return showError('forgot-error', 'Vui lòng nhập email')
  const { error } = await supabase.auth.resetPasswordForEmail(email, {
    redirectTo: window.location.origin + '/reset-password.html'
  })
  if (error) showError('forgot-error', error.message)
  else showSuccess('forgot-success', 'Đã gửi link đặt lại mật khẩu vào email của bạn!')
}

// Check if already logged in
window.addEventListener('load', async () => {
  const { data: { session } } = await supabase.auth.getSession()
  if (session) window.location.href = 'index.html'
})
</script>
</body>
</html>
