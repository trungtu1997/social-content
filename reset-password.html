<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Đặt lại mật khẩu — Social Content</title>
<link rel="stylesheet" href="css/style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/config.js"></script>
</head>
<body>
<div id="login-page">
  <div class="login-card">
    <div class="login-logo">
      <div class="login-logo-icon"><i class="ti ti-lock-open" style="font-size:20px">🔑</i></div>
      <div class="login-logo-name">Đặt lại mật khẩu</div>
    </div>
    <div class="error-msg" id="err" style="display:none"></div>
    <div class="success-msg" id="ok" style="display:none"></div>
    <div class="form-group">
      <label>Mật khẩu mới</label>
      <input type="password" id="pw1" placeholder="Tối thiểu 6 ký tự">
    </div>
    <div class="form-group">
      <label>Xác nhận mật khẩu</label>
      <input type="password" id="pw2" placeholder="Nhập lại">
    </div>
    <button class="btn btn-primary btn-full" onclick="resetPw()">Đặt lại mật khẩu</button>
  </div>
</div>
<script>
async function resetPw() {
  const pw1 = document.getElementById('pw1').value
  const pw2 = document.getElementById('pw2').value
  const err = document.getElementById('err')
  const ok = document.getElementById('ok')
  if (pw1 !== pw2) { err.textContent = 'Mật khẩu không khớp'; err.style.display='block'; return }
  if (pw1.length < 6) { err.textContent = 'Mật khẩu tối thiểu 6 ký tự'; err.style.display='block'; return }
  const { error } = await supabase.auth.updateUser({ password: pw1 })
  if (error) { err.textContent = error.message; err.style.display='block' }
  else { ok.textContent = 'Đặt lại thành công! Đang chuyển hướng...'; ok.style.display='block'; setTimeout(() => window.location.href='login.html', 2000) }
}
</script>
</body>
</html>
